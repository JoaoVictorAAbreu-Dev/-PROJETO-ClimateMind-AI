version: '3.8'

services:
  backend:
    build: ./backend
    container_name: climatemind-backend
    ports:
      - "8000:8000"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --reload
    networks:
      - climatemind

  frontend:
    build: ./frontend
    container_name: climatemind-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
    networks:
      - climatemind

networks:
  climatemind:
    driver: bridge